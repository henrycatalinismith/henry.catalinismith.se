<li class="list-item-post">
  <h2 class="list-item-post__title">
    <a class="list-item-post__link" href="{{ include.post.url | relative_url }}">
      {{ include.post.title | escape }}
    </a>
  </h2>
  <span class="list-item-post__meta">
    <span class="list-item-post__icon" aria-hidden="true">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16"><path d="M11.013 1.427a1.75 1.75 0 0 1 2.474 0l1.086 1.086a1.75 1.75 0 0 1 0 2.474l-8.61 8.61c-.21.21-.47.364-.756.445l-3.251.93a.75.75 0 0 1-.927-.928l.929-3.25c.081-.286.235-.547.445-.758l8.61-8.61Zm.176 4.823L9.75 4.81l-6.286 6.287a.253.253 0 0 0-.064.108l-.558 1.953 1.953-.558a.253.253 0 0 0 .108-.064Zm1.238-3.763a.25.25 0 0 0-.354 0L10.811 3.75l1.439 1.44 1.263-1.263a.25.25 0 0 0 0-.354Z"/></svg>
    </span>
    Blog post · {{ include.post.date | date: "%b %-d, %Y" }}
  </span>
  {%- if include.post.description -%}
    <p class="list-item-post__excerpt">{{ include.post.description }}</p>
  {%- elsif include.post.excerpt -%}
    <p class="list-item-post__excerpt">{{ include.post.excerpt | strip_html | truncatewords: 120 }}</p>
  {%- endif -%}
</li>
